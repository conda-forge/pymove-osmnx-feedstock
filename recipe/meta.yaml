{% set name = "pymove-osmnx" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f7328aff47c4b437ff3a8607dc03f9e7ae5204b46d17ecddde3e34ea8d0e7b81

build:
  number: 1
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - pymove >=2.6.1
    - python >={{ python_min }}
    - osmnx >=1.0.0

test:
  requires:
    - pytest
    - python {{ python_min }}
  imports:
    - pymove_osmnx
    - pymove_osmnx.core
    - pymove_osmnx.utils

about:
  home: https://github.com/InsightLab/pymove-osmnx
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: |
    Uses pymove and osmnx to perform map matching and operations on trajectory data

extra:
  recipe-maintainers:
    - mxaviersmp
